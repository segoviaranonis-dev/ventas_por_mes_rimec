<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} - {{ system_name }}</title>
    <style>
        /* Reset y Base */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
            background-color: #F1F5F9;
        }

        .email-wrapper {
            width: 100%;
            background-color: #F1F5F9;
            padding: 20px 0;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Header */
        .email-header {
            background: linear-gradient(135deg, {{ primary_color }} 0%, #1A1C25 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .email-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .email-header .tagline {
            margin: 8px 0 0 0;
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Content */
        .email-content {
            padding: 30px 20px;
        }

        .email-content h2 {
            color: #1E293B;
            font-size: 20px;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        .email-content p {
            margin: 0 0 15px 0;
            color: #475569;
        }

        .email-content strong {
            color: #1E293B;
            font-weight: 600;
        }

        /* Info Box */
        .info-box {
            background-color: #F8FAFC;
            border-left: 4px solid {{ primary_color }};
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
        }

        .info-box .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748B;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .info-box .value {
            font-size: 18px;
            color: #1E293B;
            font-weight: 700;
        }

        /* Stats Grid */
        .stats-grid {
            display: table;
            width: 100%;
            margin: 20px 0;
        }

        .stat-item {
            display: table-cell;
            width: 50%;
            padding: 15px;
            text-align: center;
            background-color: #F8FAFC;
            border-right: 1px solid #E2E8F0;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-item .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #64748B;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-item .stat-value {
            font-size: 22px;
            color: {{ primary_color }};
            font-weight: 900;
        }

        /* Button */
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: {{ primary_color }};
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            margin: 20px 0;
        }

        .button:hover {
            opacity: 0.9;
        }

        /* Alert Box */
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }

        .alert-success {
            background-color: #ECFDF5;
            border-left: 4px solid #10B981;
            color: #065F46;
        }

        .alert-warning {
            background-color: #FEF3C7;
            border-left: 4px solid #F59E0B;
            color: #92400E;
        }

        /* Footer */
        .email-footer {
            background-color: #F8FAFC;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #E2E8F0;
        }

        .email-footer p {
            margin: 5px 0;
            font-size: 12px;
            color: #64748B;
        }

        .email-footer .timestamp {
            font-size: 11px;
            color: #94A3B8;
            margin-top: 10px;
        }

        /* Responsive */
        @media only screen and (max-width: 600px) {
            .email-container {
                border-radius: 0;
            }

            .email-content {
                padding: 20px 15px;
            }

            .stat-item {
                display: block;
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #E2E8F0;
            }

            .stat-item:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="email-container">
            <!-- Header -->
            <div class="email-header">
                <h1>{{ company_name }}</h1>
                <div class="tagline">{{ system_name }} - Business Intelligence</div>
            </div>

            <!-- Content -->
            <div class="email-content">
                {% block content %}
                <!-- Contenido específico del email -->
                {% endblock %}
            </div>

            <!-- Footer -->
            <div class="email-footer">
                <p><strong>{{ company_name }}</strong> — {{ system_name }}</p>
                <p>Este es un mensaje automático generado por el sistema.</p>
                <p>Por favor no responda a este correo.</p>
                <div class="timestamp">{{ timestamp }}</div>
            </div>
        </div>
    </div>
</body>
</html>
